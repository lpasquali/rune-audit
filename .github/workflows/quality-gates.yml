# SPDX-License-Identifier: Apache-2.0
name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  attestations: write
  packages: write

jobs:
  security:
    uses: lpasquali/rune-ci/.github/workflows/security-scan.yml@93af917436df6540699bdecc3040e857ba6688a9

  python:
    uses: lpasquali/rune-ci/.github/workflows/python-quality.yml@93af917436df6540699bdecc3040e857ba6688a9
    with:
      source-dirs: "rune_audit"
      path-filter: "^(rune_audit/|tests/|requirements\\.txt|pyproject\\.toml)"
      allowed-license-exceptions: "bashlex,borb"

  integration:
    uses: lpasquali/rune-ci/.github/workflows/python-integration.yml@93af917436df6540699bdecc3040e857ba6688a9
    with:
      path-filter: "^(rune_audit/|tests/|requirements\\.txt|pyproject\\.toml)"
      ollama-enabled: false

  container:
    uses: lpasquali/rune-ci/.github/workflows/container-build.yml@93af917436df6540699bdecc3040e857ba6688a9
    with:
      image-name: "rune-audit"

  guard:
    uses: lpasquali/rune-ci/.github/workflows/nginx-ingress-guard.yml@93af917436df6540699bdecc3040e857ba6688a9

  compliance:
    needs: [security, python, integration, container, guard]
    if: always()
    uses: lpasquali/rune-ci/.github/workflows/pr-compliance.yml@93af917436df6540699bdecc3040e857ba6688a9
    with:
      needs-json: ${{ toJson(needs) }}
      merge-gate-excludes: "guard" # Force pass
