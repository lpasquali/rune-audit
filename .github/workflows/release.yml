name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    uses: lpasquali/rune-ci/.github/workflows/release.yml@v0.1.0
    with:
      build-container: false
