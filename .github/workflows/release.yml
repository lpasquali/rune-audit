# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    uses: lpasquali/rune-ci/.github/workflows/release.yml@main
    with:
      image-name: "rune-audit"
      generate-sbom: true
      slsa-attestation: true
